<!DOCTYPE html>
<html>
<head>
    <title>Studenti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Seznam studentů</h1>

<a href="/create" class="btn btn-primary mb-3">Přidat studenta</a>

<table class="table table-striped">
<tr>
<th>Jméno</th><th>Příjmení</th><th>Email</th><th>Obor</th><th>Akce</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[3] }}</td>
<td>{{ s[4] }}</td>
<td>
<a href="/edit/{{ s[0] }}" class="btn btn-warning">Edit</a>
<a href="/delete/{{ s[0] }}" class="btn btn-danger">Delete</a>
</td>
</tr>
{% endfor %}

</table>
</body>
</html>
